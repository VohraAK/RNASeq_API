services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - uploads:/var/rnaseq/uploads
      - ../gui_rna_seq/src:/deseq_src:ro
    environment:
      PYTHONPATH: /app:/deseq_src/backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    build: .
    command: >
      sh -c "procrastinate --app app.workers.tasks.procrastinate_app schema --apply &&
             procrastinate --app app.workers.tasks.procrastinate_app worker --concurrency 1"
    env_file: .env
    volumes:
      - uploads:/var/rnaseq/uploads
      - ../gui_rna_seq/src:/deseq_src:ro
    environment:
      PYTHONPATH: /app:/deseq_src/backend
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
